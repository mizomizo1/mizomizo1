@keyframes fadeIn {
    from {
        opacity: 0;
    }
    to {
        opacity: 1;
    }
}
@keyframes slideIn {
    from {
        width: 0;
    }
    to {
        width: 660;
    }
}

#lang_legend,
#title {
    opacity: 0;
    animation: fadeIn 1s ease-in forwards;
}
#bar_back {
    animation: slideIn 1.7s ease-in forwards;
}
</style>
<rect id="border" x="1" y="1" width="408" height="168" fill='#19140fff' stroke-width="1" rx="15" ry="15" />
<text id="title" x="20" y="40" font-size="18" font-weight="bold" fill='#db4c0fff' font-family="system-ui, -apple-system, sans-serif">Most Used Languages</text>

<defs>
    <clipPath id="roundedClip">
        <rect id="bar_back" x="20" y="60" width="370" height="10" rx="5" ry="5">
        </rect>
    </clipPath>
</defs>
<rect width="370" height="10" x="20" y="60" rx="5" ry="5" fill='#ccc' />
