<?xml version="1.0" encoding="UTF-8"?>
<svg width="410" height="170" xmlns="http://www.w3.org/2000/svg">
<style>text {
    color: #a89f9bff;
}

tspan {
    fill: #f3f3f3;
}

/* @media (prefers-color-scheme: dark) {
}
